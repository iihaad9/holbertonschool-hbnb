<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
  <header>
    <img src="images/logo.png" alt="HBnB logo" class="logo">
    <a href="login.html" class="login-button">Login</a>
  </header>

  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </nav>

  <main>
    <section id="place-details" class="place-details">
      <!-- Place details will be populated dynamically -->
    </section>

    <section id="place-amenities" class="place-amenities">
      <h2>Amenities</h2>

      <div id="amenities-list">
        <div class="amenity">
          <img src="images/wifi.png" alt="Wi-Fi icon" class="amenity-icon">
          <span>Wi-Fi</span>
        </div>

        <div class="amenity">
          <img src="images/pool.png" alt="Swimming pool icon" class="amenity-icon">
          <span>Pool</span>
        </div>

        <div class="amenity">
          <img src="images/parking.png" alt="Parking icon" class="amenity-icon">
          <span>Parking</span>
        </div>

        <div class="amenity">
          <img src="images/pets.png" alt="Pets allowed icon" class="amenity-icon">
          <span>Pets Allowed</span>
        </div>
      </div>
    </section>

    <section id="reviews">
      <h2>Reviews</h2>
      <div id="reviews-list"></div>
    </section>

    <section id="add-review" style="display: none;">
      <a id="add-review-link" class="details-button" href="#">Add Review</a>
    </section>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
